global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "howlhouse-backend"
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
  - job_name: "howlhouse-worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9100"]
