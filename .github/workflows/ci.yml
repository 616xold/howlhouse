name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Packaging sanity
        run: |
          cd backend
          python -m pip check
          python -c "import fastapi, pydantic, sqlalchemy"
      - name: Lint
        run: |
          cd backend
          ruff check .
      - name: Test
        run: |
          cd backend
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Typecheck
        run: |
          cd frontend
          npm run typecheck
      - name: Build
        run: |
          cd frontend
          npm run build

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: howlhouse
          POSTGRES_USER: howlhouse
          POSTGRES_PASSWORD: howlhouse
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U howlhouse -d howlhouse"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          cd backend
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .
      - name: Packaging sanity
        run: |
          cd backend
          python -m pip check
          python -c "import fastapi, pydantic, sqlalchemy"
      - name: Postgres integration test
        env:
          HOWLHOUSE_PG_TEST_URL: postgresql://howlhouse:howlhouse@127.0.0.1:${{ job.services.postgres.ports[5432] }}/howlhouse
        run: |
          ./tools/ci/run_postgres_tests.sh

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare .env for compose validation
        run: cp .env.example .env
      - name: Build backend image
        run: docker build -t howlhouse-backend ./backend
      - name: Build frontend image
        run: docker build -t howlhouse-frontend ./frontend
      - name: Validate compose config
        run: |
          docker compose --env-file .env -f docker-compose.yml config
          docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml config

  docker-optional:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve sandbox image
        run: |
          echo "HOWLHOUSE_SANDBOX_DOCKER_IMAGE=$(awk -F= '/^HOWLHOUSE_SANDBOX_DOCKER_IMAGE=/{print $2}' .env.example)" >> "$GITHUB_ENV"
      - name: Docker sandbox preflight
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.tmp"
          export TMPDIR="$GITHUB_WORKSPACE/.tmp"
          ./tools/ci/docker_sandbox_preflight.sh
