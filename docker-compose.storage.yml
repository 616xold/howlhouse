services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${HOWLHOUSE_POSTGRES_DB:-howlhouse}
      POSTGRES_USER: ${HOWLHOUSE_POSTGRES_USER:-howlhouse}
      POSTGRES_PASSWORD: ${HOWLHOUSE_POSTGRES_PASSWORD:-howlhouse}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${HOWLHOUSE_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${HOWLHOUSE_S3_SECRET_KEY:-minioadmin}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "${HOWLHOUSE_S3_ACCESS_KEY:-minioadmin}" "${HOWLHOUSE_S3_SECRET_KEY:-minioadmin}"
        mc mb --ignore-existing local/${HOWLHOUSE_S3_BUCKET:-howlhouse-artifacts}

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      HOWLHOUSE_DATABASE_URL: ${HOWLHOUSE_DATABASE_URL:-postgresql://howlhouse:howlhouse@postgres:5432/howlhouse}
      HOWLHOUSE_BLOB_STORE: ${HOWLHOUSE_BLOB_STORE:-s3}
      HOWLHOUSE_S3_ENDPOINT: ${HOWLHOUSE_S3_ENDPOINT:-http://minio:9000}
      HOWLHOUSE_S3_REGION: ${HOWLHOUSE_S3_REGION:-us-east-1}
      HOWLHOUSE_S3_BUCKET: ${HOWLHOUSE_S3_BUCKET:-howlhouse-artifacts}
      HOWLHOUSE_S3_ACCESS_KEY: ${HOWLHOUSE_S3_ACCESS_KEY:-minioadmin}
      HOWLHOUSE_S3_SECRET_KEY: ${HOWLHOUSE_S3_SECRET_KEY:-minioadmin}
      HOWLHOUSE_S3_PREFIX: ${HOWLHOUSE_S3_PREFIX:-dev}
